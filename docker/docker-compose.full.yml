services:
  # ─────────────────────────────────────────────
  # PicoClaw Agent (one-shot query) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml run --rm fernwood-agent -m "Hello"
  # ─────────────────────────────────────────────
  fernwood-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: fernwood-agent-full
    profiles:
      - agent
    volumes:
      - ../config/config.json:/root/.fernwood/config.json:ro
      - fernwood-workspace:/root/.fernwood/workspace
      - fernwood-npm-cache:/root/.npm # npm cache for faster MCP server installs
    entrypoint: ["fernwood", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # PicoClaw Gateway (Long-running Bot) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml --profile gateway up
  # ─────────────────────────────────────────────
  fernwood-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: fernwood-gateway-full
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ../config/config.json:/root/.fernwood/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - fernwood-workspace:/root/.fernwood/workspace
      # NPM cache for faster MCP server installs
      - fernwood-npm-cache:/root/.npm
    command: ["gateway"]

volumes:
  fernwood-workspace:
  fernwood-npm-cache: # Cache npm packages to speed up MCP server installations
