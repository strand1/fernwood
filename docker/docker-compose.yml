services:
  # ─────────────────────────────────────────────
  # PicoClaw Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm fernwood-agent -m "Hello"
  # ─────────────────────────────────────────────
  fernwood-agent:
    image: docker.io/strand1/fernwood:latest
    container_name: fernwood-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.fernwood
    entrypoint: ["fernwood", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # PicoClaw Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml up fernwood-gateway
  # ─────────────────────────────────────────────
  fernwood-gateway:
    image: docker.io/strand1/fernwood:latest
    container_name: fernwood-gateway
    restart: on-failure
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.fernwood
